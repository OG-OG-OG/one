<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0e0e0e" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black" />
  <meta name="apple-mobile-web-app-title" content="one." />
  <link rel="manifest" id="pwa-manifest" />
  <link rel="apple-touch-icon" id="pwa-icon" />
  <title>one.</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0e0e0e;
      --surface: #161616;
      --surface2: #1e1e1e;
      --border: #2a2a2a;
      --text: #eeebe6;
      --dim: #777;
      --muted: #444;
      --accent: #d4c4a8;
      --danger: #c06060;
    }

    * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
    html, body { height:100%; overflow:hidden; background:var(--bg); color:var(--text); font-family:'DM Mono',monospace; }

    /* ── NAV BAR ── */
    .nav-bar {
      position: fixed; bottom: 0; left: 0; right: 0;
      height: calc(56px + env(safe-area-inset-bottom));
      background: var(--surface);
      border-top: 1px solid var(--border);
      display: flex; z-index: 50;
      padding-bottom: env(safe-area-inset-bottom);
    }
    .nav-item {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 4px;
      background: none; border: none; cursor: pointer;
      color: var(--muted); font-family: 'DM Mono', monospace;
      font-size: 9px; letter-spacing: 0.15em; text-transform: uppercase;
      transition: color 0.2s;
    }
    .nav-item.active { color: var(--accent); }
    .nav-item svg { width: 20px; height: 20px; }

    /* ── SCREENS ── */
    .screen {
      position: fixed; inset: 0;
      padding-bottom: calc(56px + env(safe-area-inset-bottom));
      padding-top: env(safe-area-inset-top, 0px);
      display: flex; flex-direction: column;
      opacity: 0; pointer-events: none;
      transition: opacity 0.3s ease;
    }
    .screen.active { opacity:1; pointer-events:all; }

    .screen-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 20px 24px 16px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .screen-title {
      font-size: 13px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--dim);
    }

    /* ── TODAY ── */
    #screen-today { justify-content: flex-start; gap: 0; }

    .today-header {
      padding: 24px 24px 0;
      flex-shrink: 0;
    }
    .today-date-num {
      font-size: clamp(80px, 22vw, 128px);
      font-weight: 300; line-height: 0.85;
      letter-spacing: -0.04em; color: var(--text);
    }
    .today-date-sub {
      font-size: 11px; color: var(--dim);
      letter-spacing: 0.2em; text-transform: uppercase;
      margin-top: 10px;
    }
    .streak { font-size: 10px; color: var(--accent); letter-spacing: 0.15em; margin-top: 5px; }

    .photo-zone {
      flex: 1; margin: 16px 24px 0;
      position: relative;
      background: var(--surface);
      border: 1px solid var(--border);
      overflow: hidden; min-height: 0;
    }
    .photo-zone.has-photo { cursor: default; }

    .photo-empty {
      position: absolute; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 10px;
      cursor: pointer;
    }
    .photo-empty svg { opacity: 0.18; }
    .photo-empty span {
      font-size: 10px; color: var(--muted);
      letter-spacing: 0.2em; text-transform: uppercase;
    }

    #photo-preview {
      width: 100%; height: 100%; object-fit: cover;
      display: none;
    }
    #photo-preview.on { display: block; }

    /* 사진 위 버튼들 */
    .photo-btns {
      position: absolute; bottom: 10px; right: 10px;
      display: none; gap: 6px;
    }
    .photo-btns.on { display: flex; }
    .photo-btn {
      background: rgba(14,14,14,0.85); border: 1px solid var(--border);
      color: var(--dim); font-family: 'DM Mono', monospace;
      font-size: 9px; letter-spacing: 0.12em; text-transform: uppercase;
      padding: 7px 12px; cursor: pointer;
      backdrop-filter: blur(8px); transition: all 0.2s;
    }
    .photo-btn:hover { color: var(--text); }
    .photo-btn.del { color: var(--danger); border-color: #3a1818; }

    /* caption + save */
    .bottom-bar {
      flex-shrink: 0;
      padding: 14px 24px 16px;
      border-top: 1px solid var(--border);
      background: var(--bg);
    }
    .caption-row {
      display: flex; align-items: center; gap: 0;
      border-bottom: 1px solid var(--border);
      padding-bottom: 12px; margin-bottom: 12px;
    }
    .caption-dash { font-size: 14px; color: var(--muted); flex-shrink: 0; padding-right: 8px; }
    #caption-input {
      flex: 1; background: none; border: none; outline: none;
      font-family: 'DM Mono', monospace; font-size: 14px;
      color: var(--text); caret-color: var(--accent);
    }
    #caption-input::placeholder { color: var(--muted); }
    .action-row {
      display: flex; align-items: center; justify-content: space-between;
    }
    .char-count { font-size: 10px; color: var(--muted); letter-spacing: 0.1em; }
    .save-btn {
      background: none; border: 1px solid var(--border);
      color: var(--dim); font-family: 'DM Mono', monospace;
      font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase;
      padding: 10px 24px; cursor: pointer; transition: all 0.2s;
      min-width: 100px; text-align: center;
    }
    .save-btn:active { background: var(--accent); color: var(--bg); border-color: var(--accent); }
    .save-btn.saved { color: var(--accent); border-color: var(--accent); }

    /* ── ARCHIVE ── */
    #screen-archive { }

    .year-row {
      display: flex; gap: 0; padding: 0 24px;
      overflow-x: auto; scrollbar-width: none; flex-shrink: 0;
    }
    .year-row::-webkit-scrollbar { display: none; }
    .year-btn {
      background: none; border: none; cursor: pointer;
      font-family: 'DM Mono', monospace; font-size: 11px;
      letter-spacing: 0.15em; color: var(--muted);
      padding: 14px 16px 12px;
      border-bottom: 2px solid transparent; transition: all 0.2s;
      white-space: nowrap; flex-shrink: 0;
    }
    .year-btn.active { color: var(--accent); border-bottom-color: var(--accent); }

    /* 카드 슬라이드 */
    .cards-wrap {
      flex: 1; overflow-y: auto;
      padding: 16px 24px 24px;
      display: flex; flex-direction: column; gap: 12px;
      -webkit-overflow-scrolling: touch;
    }
    .cards-wrap::-webkit-scrollbar { width: 2px; }
    .cards-wrap::-webkit-scrollbar-thumb { background: var(--border); }

    .entry-card {
      background: var(--surface);
      border: 1px solid var(--border);
      overflow: hidden;
      flex-shrink: 0;
    }
    .card-photo {
      width: 100%; aspect-ratio: 4/3;
      object-fit: cover; display: block;
    }
    .card-no-photo {
      width: 100%; height: 80px;
      display: flex; align-items: center; justify-content: center;
      background: var(--surface2);
      font-size: 10px; color: var(--muted); letter-spacing: 0.15em;
    }
    .card-body {
      padding: 14px 16px;
      display: flex; flex-direction: column; gap: 10px;
    }
    .card-date {
      font-size: 10px; color: var(--dim); letter-spacing: 0.18em; text-transform: uppercase;
    }
    .card-caption {
      font-size: 13px; color: var(--text); line-height: 1.5;
    }
    .card-caption.empty { color: var(--muted); font-size: 11px; }

    /* 카드 편집 영역 */
    .card-edit {
      border-top: 1px solid var(--border);
      padding: 12px 16px;
      display: none; flex-direction: column; gap: 10px;
    }
    .card-edit.open { display: flex; }
    .card-caption-input {
      width: 100%; background: var(--surface2); border: 1px solid var(--border);
      color: var(--text); font-family: 'DM Mono', monospace;
      font-size: 13px; padding: 10px 12px; outline: none;
      caret-color: var(--accent);
    }
    .card-caption-input::placeholder { color: var(--muted); }
    .card-edit-btns {
      display: flex; gap: 8px;
    }
    .card-edit-btn {
      flex: 1; background: none; border: 1px solid var(--border);
      color: var(--dim); font-family: 'DM Mono', monospace;
      font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase;
      padding: 10px 8px; cursor: pointer; transition: all 0.2s;
      display: flex; align-items: center; justify-content: center; gap: 6px;
    }
    .card-edit-btn:active { background: var(--surface2); color: var(--text); }
    .card-edit-btn.save-cap { color: var(--accent); border-color: var(--accent); }
    .card-edit-btn.del-photo { color: var(--danger); border-color: #3a1818; }
    .card-edit-btn.del-entry { color: var(--danger); border-color: #3a1818; }

    /* 카드 탭 영역 */
    .card-tap-row {
      padding: 10px 16px;
      border-top: 1px solid var(--border);
      display: flex; justify-content: flex-end;
    }
    .card-edit-toggle {
      background: none; border: none; cursor: pointer;
      font-family: 'DM Mono', monospace; font-size: 10px;
      letter-spacing: 0.15em; text-transform: uppercase;
      color: var(--dim); padding: 4px 0; transition: color 0.2s;
    }
    .card-edit-toggle.open { color: var(--accent); }

    .archive-empty {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 10px;
    }
    .archive-empty span {
      font-size: 10px; color: var(--muted); letter-spacing: 0.2em; text-transform: uppercase;
    }

    /* ── STATS ── */
    .stats-scroll {
      flex: 1; overflow-y: auto; padding: 20px 24px 24px;
      display: flex; flex-direction: column; gap: 12px;
    }
    .stat-card {
      background: var(--surface); border: 1px solid var(--border);
      padding: 20px;
    }
    .stat-label { font-size: 9px; color: var(--muted); letter-spacing: 0.22em; text-transform: uppercase; margin-bottom: 8px; }
    .stat-val { font-size: 52px; font-weight: 300; line-height: 1; }
    .stat-sub { font-size: 10px; color: var(--dim); letter-spacing: 0.12em; margin-top: 6px; }
    .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

    .bar-track { height: 2px; background: var(--border); margin-top: 14px; }
    .bar-fill { height: 2px; background: var(--accent); transition: width 0.8s cubic-bezier(0.16,1,0.3,1); width: 0; }

    .setting-row {
      background: var(--surface); border: 1px solid var(--border);
      padding: 18px 20px;
      display: flex; align-items: center; justify-content: space-between; gap: 16px;
    }
    .setting-label { font-size: 12px; color: var(--text); letter-spacing: 0.08em; }
    .setting-sub { font-size: 10px; color: var(--muted); letter-spacing: 0.08em; margin-top: 3px; }
    .toggle-btn {
      background: none; border: 1px solid var(--border);
      font-family: 'DM Mono', monospace; font-size: 10px;
      letter-spacing: 0.15em; text-transform: uppercase;
      color: var(--muted); padding: 8px 16px; cursor: pointer;
      transition: all 0.2s; white-space: nowrap; flex-shrink: 0;
    }
    .toggle-btn.on { color: var(--accent); border-color: var(--accent); }

    .export-btn {
      background: none; border: 1px solid var(--border);
      font-family: 'DM Mono', monospace; font-size: 11px;
      letter-spacing: 0.18em; text-transform: uppercase;
      color: var(--dim); padding: 16px;
      cursor: pointer; transition: all 0.2s;
      display: flex; align-items: center; justify-content: center; gap: 10px;
    }
    .export-btn:active { color: var(--text); border-color: var(--dim); }

    /* ── BOTTOM SHEET ── */
    #sheet-overlay {
      position: fixed; inset: 0; z-index: 200;
      background: rgba(0,0,0,0.6);
      opacity: 0; pointer-events: none; transition: opacity 0.25s;
    }
    #sheet-overlay.on { opacity: 1; pointer-events: all; }
    #sheet {
      position: fixed; bottom: 0; left: 0; right: 0; z-index: 201;
      background: var(--surface2); border-top: 1px solid var(--border);
      padding-bottom: env(safe-area-inset-bottom, 12px);
      transform: translateY(100%);
      transition: transform 0.3s cubic-bezier(0.32,0.72,0,1);
    }
    #sheet-overlay.on #sheet { transform: translateY(0); }
    .sheet-title {
      font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase;
      color: var(--muted); text-align: center;
      padding: 16px 24px 12px; border-bottom: 1px solid var(--border);
    }
    .sheet-item {
      width: 100%; background: none; border: none; cursor: pointer;
      display: flex; align-items: center; gap: 16px;
      padding: 18px 24px;
      font-family: 'DM Mono', monospace; font-size: 14px;
      color: var(--text); border-bottom: 1px solid var(--border);
      transition: background 0.15s;
    }
    .sheet-item:active { background: rgba(255,255,255,0.04); }
    .sheet-cancel {
      width: 100%; background: none; border: none; cursor: pointer;
      font-family: 'DM Mono', monospace; font-size: 11px;
      letter-spacing: 0.15em; text-transform: uppercase;
      color: var(--muted); padding: 18px; transition: color 0.2s;
    }

    /* ── TOAST ── */
    #toast {
      position: fixed; bottom: calc(72px + env(safe-area-inset-bottom));
      left: 50%; transform: translateX(-50%);
      background: var(--text); color: var(--bg);
      font-size: 11px; letter-spacing: 0.15em; text-transform: uppercase;
      padding: 10px 20px; z-index: 300;
      opacity: 0; transition: opacity 0.25s; white-space: nowrap;
      pointer-events: none;
    }
    #toast.on { opacity: 1; }

    #export-canvas { display: none; }

    @keyframes fadeUp {
      from { opacity:0; transform:translateY(12px); }
      to   { opacity:1; transform:translateY(0); }
    }
    .fadein { animation: fadeUp 0.5s ease both; }
  </style>
</head>
<body>

<!-- TODAY -->
<div id="screen-today" class="screen active">
  <div class="today-header fadein">
    <div class="today-date-num" id="date-num"></div>
    <div class="today-date-sub" id="date-sub"></div>
    <div class="streak" id="streak"></div>
  </div>

  <div class="photo-zone" id="photo-zone">
    <div class="photo-empty" id="photo-empty" onclick="openSheet()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" width="36" height="36">
        <rect x="3" y="3" width="18" height="18" rx="1"/>
        <circle cx="12" cy="12" r="4"/>
        <path d="M9 3v2M15 3v2"/>
      </svg>
      <span>사진 추가</span>
    </div>
    <img id="photo-preview" />
    <div class="photo-btns" id="photo-btns">
      <button class="photo-btn" onclick="openSheet()">교체</button>
      <button class="photo-btn del" onclick="deleteTodayPhoto()">삭제</button>
    </div>
  </div>

  <div class="bottom-bar">
    <div class="caption-row">
      <span class="caption-dash">—</span>
      <input id="caption-input" type="text" maxlength="80" placeholder="오늘 하루를 한 줄로" />
    </div>
    <div class="action-row">
      <span class="char-count" id="char-count">0 / 80</span>
      <button class="save-btn" id="save-btn" onclick="saveEntry()">SAVE</button>
    </div>
  </div>
</div>

<!-- ARCHIVE -->
<div id="screen-archive" class="screen">
  <div class="screen-header">
    <span class="screen-title">archive</span>
    <div class="year-row" id="year-row" style="border:none;padding:0;margin:0;"></div>
  </div>
  <div class="cards-wrap" id="cards-wrap"></div>
</div>

<!-- STATS -->
<div id="screen-stats" class="screen">
  <div class="screen-header">
    <span class="screen-title">stats</span>
  </div>
  <div class="stats-scroll">
    <div class="stat-grid">
      <div class="stat-card">
        <div class="stat-label">올해 기록</div>
        <div class="stat-val" id="stat-days">0</div>
        <div class="stat-sub">days</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">연속 기록</div>
        <div class="stat-val" id="stat-streak">0</div>
        <div class="stat-sub">streak</div>
      </div>
    </div>
    <div class="stat-card">
      <div class="stat-label">올해 달성률</div>
      <div class="stat-val" id="stat-pct">0%</div>
      <div class="bar-track"><div class="bar-fill" id="stat-bar"></div></div>
      <div class="stat-sub" id="stat-sub"></div>
    </div>
    <div class="stat-card">
      <div class="stat-label">총 기록</div>
      <div class="stat-val" id="stat-total">0</div>
      <div class="stat-sub" id="stat-since">days total</div>
    </div>
    <div class="setting-row">
      <div>
        <div class="setting-label">매일 알림</div>
        <div class="setting-sub" id="notify-sub">오늘 기록 안 했을 때 알려드려요</div>
      </div>
      <button class="toggle-btn" id="notify-btn" onclick="toggleNotify()">켜기</button>
    </div>
    <button class="export-btn" onclick="exportToday()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
        <polyline points="7 10 12 15 17 10"/>
        <line x1="12" y1="15" x2="12" y2="3"/>
      </svg>
      오늘 기록 이미지로 저장
    </button>
  </div>
</div>

<!-- NAV BAR -->
<nav class="nav-bar">
  <button class="nav-item active" id="nav-today" onclick="showScreen('today')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
      <rect x="3" y="3" width="18" height="18" rx="1"/>
      <circle cx="12" cy="12" r="4"/>
    </svg>
    today
  </button>
  <button class="nav-item" id="nav-archive" onclick="showScreen('archive')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
      <path d="M3 3h18v4H3zM3 9h18v12H3z"/>
      <line x1="9" y1="15" x2="15" y2="15"/>
    </svg>
    archive
  </button>
  <button class="nav-item" id="nav-stats" onclick="showScreen('stats')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
      <line x1="18" y1="20" x2="18" y2="10"/>
      <line x1="12" y1="20" x2="12" y2="4"/>
      <line x1="6" y1="20" x2="6" y2="14"/>
    </svg>
    stats
  </button>
</nav>

<!-- SHEET -->
<div id="sheet-overlay" onclick="closeSheet()">
  <div id="sheet" onclick="event.stopPropagation()">
    <div class="sheet-title">사진 추가</div>
    <button class="sheet-item" onclick="pickPhoto('camera')">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
        <circle cx="12" cy="13" r="4"/>
      </svg>
      카메라로 촬영
    </button>
    <button class="sheet-item" onclick="pickPhoto('gallery')">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <rect x="3" y="3" width="18" height="18" rx="2"/>
        <circle cx="8.5" cy="8.5" r="1.5"/>
        <polyline points="21 15 16 10 5 21"/>
      </svg>
      갤러리에서 선택
    </button>
    <button class="sheet-cancel" onclick="closeSheet()">취소</button>
  </div>
</div>

<div id="toast"></div>
<canvas id="export-canvas" style="display:none"></canvas>
<input type="file" id="file-input" accept="image/*" style="position:fixed;top:-9999px;opacity:0;" />

<script>
// ── PWA ──
function makeIcon(size) {
  const c = document.createElement('canvas');
  c.width = c.height = size;
  const ctx = c.getContext('2d');
  ctx.fillStyle = '#0e0e0e'; ctx.fillRect(0,0,size,size);
  ctx.beginPath(); ctx.arc(size/2,size/2,size*.30,0,Math.PI*2);
  ctx.strokeStyle='#d4c4a8'; ctx.lineWidth=size*.055; ctx.stroke();
  ctx.beginPath(); ctx.arc(size/2,size/2,size*.055,0,Math.PI*2);
  ctx.fillStyle='#d4c4a8'; ctx.fill();
  ctx.fillStyle='#d4c4a8'; ctx.font=`300 ${Math.round(size*.11)}px monospace`;
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText('one.', size/2, size*.72);
  return c.toDataURL('image/png');
}

function initPWA() {
  const i192 = makeIcon(192), i512 = makeIcon(512);
  document.getElementById('pwa-icon').href = i192;
  const m = {name:'one.',short_name:'one.',description:'하루 한 장. 나만의 타임캡슐.',
    start_url:'/one/',scope:'/one/',display:'standalone',orientation:'portrait',
    background_color:'#0e0e0e',theme_color:'#0e0e0e',
    icons:[{src:i192,sizes:'192x192',type:'image/png',purpose:'any maskable'},
           {src:i512,sizes:'512x512',type:'image/png',purpose:'any maskable'}]};
  document.getElementById('pwa-manifest').href = URL.createObjectURL(new Blob([JSON.stringify(m)],{type:'application/json'}));
  if('serviceWorker' in navigator){
    const sw=`const C='one-v2';self.addEventListener('install',e=>e.waitUntil(caches.open(C).then(c=>c.addAll([self.location.pathname])).then(()=>self.skipWaiting())));self.addEventListener('activate',e=>e.waitUntil(caches.keys().then(ks=>Promise.all(ks.filter(k=>k!==C).map(k=>caches.delete(k)))).then(()=>self.clients.claim())));self.addEventListener('fetch',e=>e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request))));`;
    navigator.serviceWorker.register(URL.createObjectURL(new Blob([sw],{type:'application/javascript'})),{scope:'./'}).catch(()=>{});
  }
  let prompt=null;
  window.addEventListener('beforeinstallprompt',e=>{e.preventDefault();prompt=e;showBanner();});
  function showBanner(){
    if(document.getElementById('install-banner'))return;
    const b=document.createElement('div');
    b.id='install-banner';
    b.style.cssText='position:fixed;bottom:calc(68px + env(safe-area-inset-bottom));left:50%;transform:translateX(-50%);background:#eeebe6;color:#0e0e0e;padding:11px 20px;font-family:"DM Mono",monospace;font-size:11px;letter-spacing:0.15em;text-transform:uppercase;display:flex;align-items:center;gap:12px;z-index:400;cursor:pointer;white-space:nowrap;box-shadow:0 4px 24px rgba(0,0,0,.4);';
    b.innerHTML='<span>앱으로 설치</span><span style="opacity:.35">✕</span>';
    b.onclick=async ev=>{
      if(ev.target.textContent==='✕'){b.remove();return;}
      if(prompt){prompt.prompt();const{outcome}=await prompt.userChoice;if(outcome==='accepted')b.remove();prompt=null;}
    };
    document.body.appendChild(b);
    setTimeout(()=>b&&b.remove(),12000);
  }
}
window.addEventListener('load',initPWA);

// ── DB ──
let db;
const DB='one-app',VER=1,ST='entries';
function openDB(){return new Promise((res,rej)=>{const r=indexedDB.open(DB,VER);r.onupgradeneeded=e=>e.target.result.createObjectStore(ST,{keyPath:'date'});r.onsuccess=e=>{db=e.target.result;res(db);};r.onerror=rej;});}
const dbGet=d=>new Promise((res,rej)=>{const r=db.transaction(ST,'readonly').objectStore(ST).get(d);r.onsuccess=()=>res(r.result);r.onerror=rej;});
const dbPut=e=>new Promise((res,rej)=>{const r=db.transaction(ST,'readwrite').objectStore(ST).put(e);r.onsuccess=res;r.onerror=rej;});
const dbDel=d=>new Promise((res,rej)=>{const r=db.transaction(ST,'readwrite').objectStore(ST).delete(d);r.onsuccess=res;r.onerror=rej;});
const dbAll=()=>new Promise((res,rej)=>{const r=db.transaction(ST,'readonly').objectStore(ST).getAll();r.onsuccess=()=>res(r.result);r.onerror=rej;});

// ── STATE ──
let currentPhoto=null, todayKey='', currentYear=new Date().getFullYear(), allEntries=[];
const M=['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];
const D=['SUN','MON','TUE','WED','THU','FRI','SAT'];
const pad=n=>String(n).padStart(2,'0');
const toKey=d=>`${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
function fmtDate(ds){const[y,m,d]=ds.split('-').map(Number);return`${y} / ${M[m-1]} ${pad(d)} / ${D[new Date(y,m-1,d).getDay()]}`;}

// ── INIT ──
async function init(){
  await openDB();
  todayKey=toKey(new Date());
  const[y,m,d]=todayKey.split('-').map(Number);
  document.getElementById('date-num').textContent=pad(d);
  document.getElementById('date-sub').textContent=`${y} / ${M[m-1]} / ${D[new Date(y,m-1,d).getDay()]}`;
  allEntries=await dbAll();
  const s=calcStreak();
  if(s>0)document.getElementById('streak').textContent=`${s}일 연속 ✦`;
  const entry=await dbGet(todayKey);
  if(entry)loadToday(entry);
  document.getElementById('caption-input').addEventListener('input',e=>{
    document.getElementById('char-count').textContent=`${e.target.value.length} / 80`;
    document.getElementById('save-btn').textContent='SAVE';
    document.getElementById('save-btn').classList.remove('saved');
  });
  document.getElementById('file-input').addEventListener('change',onFile);
}

function calcStreak(){
  const dates=allEntries.map(e=>e.date).sort().reverse();
  let s=0,c=new Date();
  for(const d of dates){if(d===toKey(c)){s++;c.setDate(c.getDate()-1);}else break;}
  return s;
}

function loadToday(entry){
  if(entry.photo){currentPhoto=entry.photo;showTodayPhoto(entry.photo);}
  if(entry.caption){
    document.getElementById('caption-input').value=entry.caption;
    document.getElementById('char-count').textContent=`${entry.caption.length} / 80`;
  }
  markSaved();
}

function showTodayPhoto(b64){
  const p=document.getElementById('photo-preview');
  p.src=b64; p.classList.add('on');
  document.getElementById('photo-empty').style.display='none';
  document.getElementById('photo-btns').classList.add('on');
  document.getElementById('photo-zone').classList.add('has-photo');
}

function deleteTodayPhoto(){
  currentPhoto=null;
  const p=document.getElementById('photo-preview');
  p.src=''; p.classList.remove('on');
  document.getElementById('photo-empty').style.display='';
  document.getElementById('photo-btns').classList.remove('on');
  document.getElementById('photo-zone').classList.remove('has-photo');
  document.getElementById('save-btn').textContent='SAVE';
  document.getElementById('save-btn').classList.remove('saved');
}

// ── SHEET ──
let sheetTarget='today';
function openSheet(target){
  sheetTarget=target||'today';
  document.getElementById('sheet-overlay').classList.add('on');
}
function closeSheet(){document.getElementById('sheet-overlay').classList.remove('on');}

function pickPhoto(src){
  closeSheet();
  const inp=document.getElementById('file-input');
  src==='camera'?inp.setAttribute('capture','environment'):inp.removeAttribute('capture');
  inp.value='';
  setTimeout(()=>inp.click(),150);
}

function onFile(e){
  const file=e.target.files[0]; if(!file)return;
  const reader=new FileReader();
  reader.onload=async ev=>{
    const b64=ev.target.result;
    if(typeof sheetTarget==='string'&&sheetTarget==='today'){
      currentPhoto=b64; showTodayPhoto(b64);
    } else {
      // archive card photo replace
      const key=sheetTarget;
      const entry=allEntries.find(e=>e.date===key);
      if(!entry)return;
      const updated={...entry,photo:b64,ts:Date.now()};
      await dbPut(updated);
      allEntries=await dbAll();
      renderCards();
      toast('사진 교체됐어요 ✦');
    }
    e.target.value='';
  };
  reader.readAsDataURL(file);
}

async function saveEntry(){
  const caption=document.getElementById('caption-input').value.trim();
  if(!currentPhoto&&!caption){toast('사진 또는 한줄을 추가하세요');return;}
  await dbPut({date:todayKey,photo:currentPhoto||null,caption,ts:Date.now()});
  allEntries=await dbAll();
  markSaved();
  toast('저장됐어요 ✦');
}
function markSaved(){
  const b=document.getElementById('save-btn');
  b.textContent='SAVED ✦'; b.classList.add('saved');
}

// ── ARCHIVE ──
async function showArchive(){
  allEntries=await dbAll();
  const thisYear=String(new Date().getFullYear());
  const years=[...new Set([thisYear,...allEntries.map(e=>e.date.split('-')[0])])].sort().reverse();
  const row=document.getElementById('year-row');
  row.innerHTML='';
  years.forEach(y=>{
    const b=document.createElement('button');
    b.className='year-btn'+(y==currentYear?' active':'');
    b.textContent=y;
    b.onclick=()=>{currentYear=parseInt(y);renderCards();row.querySelectorAll('.year-btn').forEach(btn=>btn.classList.toggle('active',btn.textContent==y));};
    row.appendChild(b);
  });
  renderCards();
}

function renderCards(){
  const wrap=document.getElementById('cards-wrap');
  wrap.innerHTML='';
  const entries=allEntries
    .filter(e=>e.date.startsWith(String(currentYear)))
    .sort((a,b)=>b.date>a.date?1:-1);

  if(!entries.length){
    wrap.innerHTML=`<div class="archive-empty"><svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" opacity=".2"><rect x="3" y="3" width="18" height="18" rx="1"/><circle cx="12" cy="12" r="4"/></svg><span>기록이 없어요</span></div>`;
    return;
  }

  entries.forEach(entry=>{
    const card=document.createElement('div');
    card.className='entry-card';
    card.dataset.date=entry.date;

    // 사진
    if(entry.photo){
      const img=document.createElement('img');
      img.className='card-photo'; img.src=entry.photo; img.loading='lazy';
      card.appendChild(img);
    } else {
      const ph=document.createElement('div');
      ph.className='card-no-photo'; ph.textContent='사진 없음';
      card.appendChild(ph);
    }

    // 본문
    const body=document.createElement('div');
    body.className='card-body';
    const dateEl=document.createElement('div');
    dateEl.className='card-date'; dateEl.textContent=fmtDate(entry.date);
    const capEl=document.createElement('div');
    capEl.className='card-caption'+(entry.caption?'':' empty');
    capEl.textContent=entry.caption||'한줄 기록 없음';
    body.appendChild(dateEl); body.appendChild(capEl);
    card.appendChild(body);

    // 편집 토글
    const tapRow=document.createElement('div');
    tapRow.className='card-tap-row';
    const toggle=document.createElement('button');
    toggle.className='card-edit-toggle';
    toggle.textContent='편집';
    tapRow.appendChild(toggle);
    card.appendChild(tapRow);

    // 편집 영역
    const editArea=document.createElement('div');
    editArea.className='card-edit';
    const inp=document.createElement('input');
    inp.className='card-caption-input';
    inp.type='text'; inp.maxLength=80;
    inp.placeholder='한줄 기록 없음';
    inp.value=entry.caption||'';
    editArea.appendChild(inp);

    const btns=document.createElement('div');
    btns.className='card-edit-btns';

    // 캡션 저장
    const saveCapBtn=document.createElement('button');
    saveCapBtn.className='card-edit-btn save-cap';
    saveCapBtn.textContent='저장';
    saveCapBtn.onclick=async()=>{
      const updated={...entry,caption:inp.value.trim(),ts:Date.now()};
      await dbPut(updated);
      allEntries=await dbAll();
      capEl.textContent=inp.value.trim()||'한줄 기록 없음';
      capEl.className='card-caption'+(inp.value.trim()?'':' empty');
      // update local entry ref
      Object.assign(entry,updated);
      saveCapBtn.textContent='저장됨 ✦';
      setTimeout(()=>saveCapBtn.textContent='저장',1500);
      toast('수정됐어요 ✦');
    };
    btns.appendChild(saveCapBtn);

    // 사진 교체
    const changePhotoBtn=document.createElement('button');
    changePhotoBtn.className='card-edit-btn';
    changePhotoBtn.textContent='사진 교체';
    changePhotoBtn.onclick=()=>{
      sheetTarget=entry.date;
      document.getElementById('sheet-overlay').classList.add('on');
    };
    btns.appendChild(changePhotoBtn);

    // 사진 삭제 (사진 있을 때만)
    if(entry.photo){
      const delPhotoBtn=document.createElement('button');
      delPhotoBtn.className='card-edit-btn del-photo';
      delPhotoBtn.textContent='사진 삭제';
      delPhotoBtn.onclick=async()=>{
        const updated={...entry,photo:null,ts:Date.now()};
        await dbPut(updated);
        allEntries=await dbAll();
        Object.assign(entry,updated);
        renderCards();
        toast('사진 삭제됐어요');
      };
      btns.appendChild(delPhotoBtn);
    }

    // 기록 삭제
    const delBtn=document.createElement('button');
    delBtn.className='card-edit-btn del-entry';
    delBtn.textContent='기록 삭제';
    delBtn.onclick=async()=>{
      await dbDel(entry.date);
      allEntries=await dbAll();
      renderCards();
      toast('삭제됐어요');
    };
    btns.appendChild(delBtn);

    editArea.appendChild(btns);
    card.appendChild(editArea);

    // 토글 클릭
    toggle.onclick=()=>{
      const open=editArea.classList.toggle('open');
      toggle.classList.toggle('open',open);
      toggle.textContent=open?'닫기':'편집';
    };

    wrap.appendChild(card);
  });
}

// ── STATS ──
function renderStats(){
  const year=new Date().getFullYear();
  const isLeap=(year%4===0&&year%100!==0)||year%400===0;
  const now=new Date();
  const dayOfYear=Math.floor((now-new Date(year,0,0))/86400000);
  const yEntries=allEntries.filter(e=>e.date.startsWith(String(year)));
  const count=yEntries.length;
  const pct=Math.round(count/dayOfYear*100);
  document.getElementById('stat-days').textContent=count;
  document.getElementById('stat-streak').textContent=calcStreak();
  document.getElementById('stat-pct').textContent=pct+'%';
  document.getElementById('stat-total').textContent=allEntries.length;
  setTimeout(()=>document.getElementById('stat-bar').style.width=pct+'%',50);
  document.getElementById('stat-sub').textContent=`${count} / ${dayOfYear}일`;
  const first=allEntries.length?allEntries.slice().sort((a,b)=>a.date>b.date?1:-1)[0].date:null;
  document.getElementById('stat-since').textContent=first?`${first} 부터`:'days total';
  updateNotifyBtn();
}

// ── NOTIFY ──
const canNotify=()=>'Notification' in window;
function updateNotifyBtn(){
  const btn=document.getElementById('notify-btn');
  const sub=document.getElementById('notify-sub');
  if(!canNotify()){btn.textContent='미지원';sub.textContent='이 브라우저는 알림을 지원하지 않아요';return;}
  const p=Notification.permission;
  if(p==='granted'&&localStorage.getItem('notify-on')==='1'){btn.textContent='켜짐';btn.classList.add('on');sub.textContent='오늘 기록 안 했을 때 알려드려요';}
  else if(p==='denied'){btn.textContent='차단됨';btn.classList.remove('on');sub.textContent='브라우저 설정에서 알림을 허용해주세요';}
  else{btn.textContent='켜기';btn.classList.remove('on');sub.textContent='오늘 기록 안 했을 때 알려드려요';}
}
async function toggleNotify(){
  if(!canNotify()){toast('알림을 지원하지 않아요');return;}
  if(Notification.permission==='denied'){toast('브라우저 설정에서 허용해주세요');return;}
  if(localStorage.getItem('notify-on')==='1'){localStorage.removeItem('notify-on');updateNotifyBtn();toast('알림을 껐어요');return;}
  const p=await Notification.requestPermission();
  if(p==='granted'){localStorage.setItem('notify-on','1');updateNotifyBtn();toast('알림을 켰어요 ✦');scheduleNotify();}
  else{updateNotifyBtn();toast('알림 권한이 필요해요');}
}
function scheduleNotify(){
  if(!canNotify()||Notification.permission!=='granted'||localStorage.getItem('notify-on')!=='1')return;
  if(!allEntries.find(e=>e.date===todayKey))
    setTimeout(()=>new Notification('one.',{body:'오늘 아직 기록하지 않았어요 📸'}),10000);
}

// ── EXPORT ──
async function exportToday(){
  const entry=await dbGet(todayKey);
  if(!entry&&!currentPhoto){toast('오늘 기록이 없어요');return;}
  const photo=currentPhoto||(entry&&entry.photo);
  const caption=(entry&&entry.caption)||document.getElementById('caption-input').value.trim();
  const canvas=document.getElementById('export-canvas');
  const S=1080; canvas.width=S; canvas.height=S;
  const ctx=canvas.getContext('2d');
  ctx.fillStyle='#0e0e0e'; ctx.fillRect(0,0,S,S);
  if(photo){await new Promise(res=>{const img=new Image();img.onload=()=>{const p=60,h=caption?S*.72:S*.82,sx=img.width>img.height?(img.width-img.height)/2:0,sy=img.height>img.width?(img.height-img.width)/2:0,sq=Math.min(img.width,img.height);ctx.drawImage(img,sx,sy,sq,sq,p,p,S-p*2,h-p);res();};img.src=photo;});}
  const ty=caption?S*.76:S*.86;
  ctx.fillStyle='#555';ctx.font='300 22px monospace';ctx.fillText(fmtDate(todayKey),60,ty);
  if(caption){ctx.fillStyle='#eeebe6';ctx.font='300 32px monospace';const mw=S-120,chars=caption.split('');let line='',lines=[];for(const ch of chars){const t=line+ch;if(ctx.measureText(t).width>mw&&line){lines.push(line);line=ch;}else line=t;}if(line)lines.push(line);lines.forEach((l,i)=>ctx.fillText(l,60,ty+50+i*44));}
  ctx.fillStyle='#333';ctx.font='300 18px monospace';ctx.textAlign='right';ctx.fillText('one.',S-40,S-36);
  const a=document.createElement('a');a.download=`one_${todayKey}.png`;a.href=canvas.toDataURL('image/png');a.click();
  toast('이미지로 저장됐어요 ✦');
}

// ── SCREENS ──
function showScreen(name){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById('screen-'+name).classList.add('active');
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  document.getElementById('nav-'+name).classList.add('active');
  if(name==='archive')showArchive();
  if(name==='stats')renderStats();
}

// ── TOAST ──
let toastT;
function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('on');
  clearTimeout(toastT);
  toastT=setTimeout(()=>t.classList.remove('on'),2200);
}

document.addEventListener('keydown',e=>{if(e.key==='Escape')closeSheet();});
document.addEventListener('DOMContentLoaded',init);
</script>

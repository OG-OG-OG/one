<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0e0e0e" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black" />
  <meta name="apple-mobile-web-app-title" content="one." />
  <meta name="description" content="하루 한 장. 나만의 타임캡슐." />
  <link rel="manifest" id="pwa-manifest" />
  <link rel="apple-touch-icon" id="pwa-icon" />
  <title>one.</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0e0e0e;
      --surface: #181818;
      --surface2: #202020;
      --border: #303030;
      --text: #f0ece6;
      --text-dim: #888;
      --text-muted: #555;
      --accent: #d4c4a8;
      --accent-dim: #9a8e7a;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    html, body {
      height: 100%; overflow: hidden;
      background: var(--bg); color: var(--text);
      font-family: 'DM Mono', monospace;
    }

    body::before {
      content: ''; position: fixed; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      opacity: 0.03; pointer-events: none; z-index: 9999;
    }

    /* ── SCREENS ── */
    .screen {
      position: fixed; inset: 0;
      display: flex; flex-direction: column;
      opacity: 0; pointer-events: none;
      transition: opacity 0.4s ease;
    }
    .screen.active { opacity: 1; pointer-events: all; }

    /* ── TODAY ── */
    #screen-today {
      justify-content: space-between;
      padding: env(safe-area-inset-top, 20px) 0 env(safe-area-inset-bottom, 20px);
    }
    .top-bar {
      display: flex; justify-content: space-between; align-items: center;
      padding: 24px 28px 0;
    }
    .app-name {
      font-family: 'Cormorant Garamond', serif;
      font-size: 22px; font-weight: 300; letter-spacing: 0.08em;
    }
    .nav-btn {
      background: none; border: none; cursor: pointer;
      color: var(--text-dim); font-family: 'DM Mono', monospace;
      font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase;
      padding: 6px 0; transition: color 0.2s;
    }
    .nav-btn:hover { color: var(--accent); }

    .date-block { padding: 0 28px; animation: fadeUp 0.6s ease both; }
    .date-day {
      font-family: 'DM Mono', monospace;
      font-size: clamp(72px, 20vw, 120px);
      font-weight: 300; line-height: 0.88; letter-spacing: -0.04em;
    }
    .date-meta {
      font-size: 10px; color: var(--text-dim);
      letter-spacing: 0.2em; text-transform: uppercase; margin-top: 10px;
    }
    .streak-badge {
      display: inline-block; font-size: 10px; color: var(--accent);
      letter-spacing: 0.15em; margin-top: 6px;
    }

    .photo-area {
      flex: 1; margin: 20px 28px; position: relative;
      border: 1px solid var(--border); border-radius: 2px;
      overflow: hidden; cursor: pointer; background: var(--surface);
      transition: border-color 0.3s;
      animation: fadeUp 0.6s 0.1s ease both; min-height: 0;
    }
    .photo-area:hover { border-color: var(--accent-dim); }
    .photo-area.has-photo { cursor: default; }

    .photo-placeholder {
      position: absolute; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 12px;
    }
    .photo-placeholder svg { opacity: 0.2; }
    .photo-placeholder p {
      font-size: 10px; color: var(--text-muted);
      letter-spacing: 0.2em; text-transform: uppercase;
    }
    #photo-preview { width: 100%; height: 100%; object-fit: cover; display: none; }
    #photo-preview.visible { display: block; }

    .photo-overlay-btn {
      position: absolute; bottom: 12px; right: 12px;
      background: rgba(14,14,14,0.8); border: 1px solid var(--border);
      color: var(--text-dim); font-family: 'DM Mono', monospace;
      font-size: 9px; letter-spacing: 0.15em; text-transform: uppercase;
      padding: 6px 10px; cursor: pointer; border-radius: 1px;
      backdrop-filter: blur(8px); transition: all 0.2s; display: none;
    }
    .photo-overlay-btn.visible { display: block; }
    .photo-overlay-btn:hover { color: var(--accent); border-color: var(--accent-dim); }

    .caption-wrap { padding: 0 28px 24px; animation: fadeUp 0.6s 0.2s ease both; }
    .caption-line {
      display: flex; align-items: flex-end;
      border-bottom: 1px solid var(--border); padding-bottom: 10px;
    }
    .caption-prefix {
      font-size: 11px; color: var(--text-muted);
      letter-spacing: 0.1em; padding-bottom: 2px; white-space: nowrap;
    }
    #caption-input {
      flex: 1; background: none; border: none; outline: none;
      font-family: 'DM Mono', monospace;
      font-size: 13px; font-weight: 300;
      color: var(--text); padding: 0 8px; caret-color: var(--accent);
    }
    #caption-input::placeholder { color: var(--text-muted); }

    .save-row {
      display: flex; justify-content: space-between; align-items: center;
      margin-top: 14px;
    }
    .char-count { font-size: 9px; color: var(--text-muted); letter-spacing: 0.1em; }
    .save-btn {
      background: none; border: 1px solid var(--border);
      color: var(--text-dim); font-family: 'DM Mono', monospace;
      font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase;
      padding: 8px 18px; cursor: pointer; border-radius: 1px; transition: all 0.25s;
    }
    .save-btn:hover { color: var(--bg); background: var(--accent); border-color: var(--accent); }
    .save-btn.saved { color: var(--accent); border-color: var(--accent-dim); }

    /* ── ARCHIVE ── */
    #screen-archive { padding: env(safe-area-inset-top, 20px) 0 env(safe-area-inset-bottom, 20px); }
    .archive-header {
      padding: 24px 28px 20px;
      display: flex; justify-content: space-between; align-items: center;
      border-bottom: 1px solid var(--border);
    }
    .archive-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 28px; font-weight: 300; letter-spacing: 0.04em;
    }
    .year-tabs { display: flex; padding: 16px 28px; overflow-x: auto; scrollbar-width: none; }
    .year-tabs::-webkit-scrollbar { display: none; }
    .year-tab {
      background: none; border: none; cursor: pointer;
      font-family: 'DM Mono', monospace; font-size: 10px;
      letter-spacing: 0.15em; text-transform: uppercase;
      color: var(--text-muted); padding: 6px 14px;
      border-bottom: 1px solid transparent; transition: all 0.2s; white-space: nowrap;
    }
    .year-tab.active { color: var(--accent); border-bottom-color: var(--accent); }
    .year-tab:hover { color: var(--text-dim); }

    .archive-grid {
      flex: 1; overflow-y: auto; padding: 4px 28px 28px;
      display: grid; grid-template-columns: repeat(3, 1fr); gap: 3px;
      scrollbar-width: thin; scrollbar-color: var(--border) transparent;
    }
    .archive-grid::-webkit-scrollbar { width: 2px; }
    .archive-grid::-webkit-scrollbar-thumb { background: var(--border); }

    .grid-cell {
      aspect-ratio: 1; background: var(--surface);
      border: 1px solid var(--border);
      position: relative; cursor: pointer; overflow: hidden; transition: opacity 0.2s;
    }
    .grid-cell:hover { opacity: 0.8; }
    .grid-cell img { width: 100%; height: 100%; object-fit: cover; }
    .grid-cell.empty { cursor: default; opacity: 0.22; }
    .grid-cell.empty::after {
      content: attr(data-day); position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 9px; color: var(--text-muted); letter-spacing: 0.1em;
    }
    .grid-cell .day-label {
      position: absolute; bottom: 4px; left: 5px;
      font-size: 8px; color: rgba(255,255,255,0.5); letter-spacing: 0.08em;
    }

    /* ── MODAL ── */
    #modal {
      position: fixed; inset: 0; z-index: 100;
      background: rgba(14,14,14,0.97); backdrop-filter: blur(20px);
      display: flex; flex-direction: column;
      opacity: 0; pointer-events: none; transition: opacity 0.3s ease;
    }
    #modal.open { opacity: 1; pointer-events: all; }

    .modal-top {
      display: flex; justify-content: space-between; align-items: center;
      padding: 20px 24px;
    }
    .modal-date {
      font-family: 'Cormorant Garamond', serif;
      font-size: 20px; font-weight: 300; letter-spacing: 0.06em;
    }
    .modal-close {
      background: none; border: none; cursor: pointer;
      color: var(--text-dim); font-size: 20px; line-height: 1; transition: color 0.2s;
    }
    .modal-close:hover { color: var(--text); }

    .modal-photo {
      flex: 1; margin: 0 24px;
      border: 1px solid var(--border); overflow: hidden; min-height: 0;
      background: var(--surface);
      display: flex; align-items: center; justify-content: center;
    }
    .modal-photo img { width: 100%; height: 100%; object-fit: contain; }
    .modal-no-photo {
      font-size: 10px; color: var(--text-muted);
      letter-spacing: 0.18em; text-transform: uppercase;
    }
    .modal-caption-wrap { padding: 16px 24px 0; }
    .caption-edit-line {
      display: flex; align-items: flex-end;
      border-bottom: 1px solid var(--border); padding-bottom: 10px;
    }
    .caption-prefix-modal {
      font-size: 11px; color: var(--text-muted);
      letter-spacing: 0.1em; padding-bottom: 2px; white-space: nowrap;
    }
    #modal-caption-input {
      flex: 1; background: none; border: none; outline: none;
      font-family: 'DM Mono', monospace;
      font-size: 13px; font-weight: 300;
      color: var(--text); padding: 0 8px; caret-color: var(--accent);
    }
    #modal-caption-input::placeholder { color: var(--text-muted); }
    .modal-caption-row {
      display: flex; justify-content: space-between; align-items: center;
      margin-top: 10px;
    }
    .modal-caption-count { font-size: 9px; color: var(--text-muted); letter-spacing: 0.1em; }
    .modal-save-btn {
      background: none; border: 1px solid var(--border);
      color: var(--text-muted); font-family: 'DM Mono', monospace;
      font-size: 10px; letter-spacing: 0.15em; text-transform: uppercase;
      padding: 6px 14px; cursor: pointer; border-radius: 1px; transition: all 0.2s;
    }
    .modal-save-btn:hover { color: var(--bg); background: var(--accent); border-color: var(--accent); }
    .modal-save-btn.saved { color: var(--accent); border-color: var(--accent-dim); }
    .modal-actions { display: flex; gap: 10px; padding: 16px 24px 28px; }
    .modal-action-btn {
      flex: 1; background: none; border: 1px solid var(--border);
      font-family: 'DM Mono', monospace; font-size: 10px;
      letter-spacing: 0.12em; text-transform: uppercase;
      color: var(--text-dim); padding: 11px 12px; cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 8px;
      transition: all 0.2s;
    }
    .modal-action-btn:hover { color: var(--text); border-color: var(--text-muted); }
    .modal-action-btn.danger { color: #c06060; border-color: #4a2020; }
    .modal-action-btn.danger:hover { background: #3a1818; color: #f09090; border-color: #7a3030; }

    /* ── STATS SCREEN ── */
    #screen-stats { padding: env(safe-area-inset-top, 20px) 0 env(safe-area-inset-bottom, 20px); overflow-y: auto; }
    .stats-header {
      padding: 24px 28px 20px;
      display: flex; justify-content: space-between; align-items: center;
      border-bottom: 1px solid var(--border);
    }
    .stats-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 28px; font-weight: 300; letter-spacing: 0.04em;
    }
    .stats-body { padding: 28px; display: flex; flex-direction: column; gap: 20px; }

    .stat-block {
      border: 1px solid var(--border); padding: 20px 22px;
      background: var(--surface);
    }
    .stat-label {
      font-size: 9px; color: var(--text-muted);
      letter-spacing: 0.22em; text-transform: uppercase; margin-bottom: 10px;
    }
    .stat-value {
      font-family: 'Cormorant Garamond', serif;
      font-size: 48px; font-weight: 300; line-height: 1; color: var(--text);
    }
    .stat-sub {
      font-size: 10px; color: var(--text-dim);
      letter-spacing: 0.12em; margin-top: 6px;
    }

    .stat-bar-wrap { margin-top: 14px; }
    .stat-bar-track {
      width: 100%; height: 2px; background: var(--border); border-radius: 1px;
    }
    .stat-bar-fill {
      height: 2px; background: var(--accent); border-radius: 1px;
      transition: width 0.8s cubic-bezier(0.16,1,0.3,1);
    }

    .stat-grid {
      display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
    }

    .notify-row {
      display: flex; align-items: center; justify-content: space-between;
      border: 1px solid var(--border); padding: 18px 22px;
      background: var(--surface);
    }
    .notify-label { font-size: 11px; letter-spacing: 0.12em; color: var(--text-dim); }
    .notify-sub { font-size: 9px; color: var(--text-muted); letter-spacing: 0.1em; margin-top: 4px; }
    .toggle-btn {
      background: none; border: 1px solid var(--border);
      font-family: 'DM Mono', monospace; font-size: 10px;
      letter-spacing: 0.15em; text-transform: uppercase;
      color: var(--text-muted); padding: 7px 14px; cursor: pointer;
      transition: all 0.2s; white-space: nowrap;
    }
    .toggle-btn.on { color: var(--accent); border-color: var(--accent-dim); }
    .toggle-btn:hover { color: var(--text); border-color: var(--text-dim); }

    .export-btn {
      width: 100%; background: none; border: 1px solid var(--border);
      font-family: 'DM Mono', monospace; font-size: 10px;
      letter-spacing: 0.2em; text-transform: uppercase;
      color: var(--text-dim); padding: 14px; cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 10px;
      transition: all 0.2s;
    }
    .export-btn:hover { color: var(--text); border-color: var(--text-dim); }

    /* hidden export canvas */
    #export-canvas { display: none; }
    #photo-sheet {
      position: fixed; inset: 0; z-index: 300;
      background: rgba(0,0,0,0.55); backdrop-filter: blur(8px);
      opacity: 0; pointer-events: none; transition: opacity 0.25s ease;
    }
    #photo-sheet.open { opacity: 1; pointer-events: all; }

    .sheet-body {
      position: absolute; bottom: 0; left: 0; right: 0;
      background: var(--surface2); border-top: 1px solid var(--border);
      padding-bottom: env(safe-area-inset-bottom, 12px);
      transform: translateY(100%);
      transition: transform 0.32s cubic-bezier(0.32,0.72,0,1);
    }
    #photo-sheet.open .sheet-body { transform: translateY(0); }

    .sheet-title {
      font-size: 10px; letter-spacing: 0.22em; text-transform: uppercase;
      color: var(--text-muted); text-align: center;
      padding: 16px 24px 14px; border-bottom: 1px solid var(--border);
    }
    .sheet-btn {
      width: 100%; background: none; border: none; cursor: pointer;
      display: flex; align-items: center; gap: 16px;
      padding: 18px 28px;
      font-family: 'DM Mono', monospace; font-size: 13px; letter-spacing: 0.05em;
      color: var(--text); border-bottom: 1px solid var(--border);
      transition: background 0.15s; text-align: left;
    }
    .sheet-btn:hover { background: rgba(255,255,255,0.04); }
    .sheet-btn svg { flex-shrink: 0; opacity: 0.6; }
    .sheet-cancel {
      width: 100%; background: none; border: none; cursor: pointer;
      font-family: 'DM Mono', monospace; font-size: 11px;
      color: var(--text-muted); letter-spacing: 0.15em; text-transform: uppercase;
      padding: 18px; transition: color 0.2s;
    }
    .sheet-cancel:hover { color: var(--text); }

    /* ── CONFIRM ── */
    #confirm-dialog {
      position: fixed; inset: 0; z-index: 400;
      background: rgba(0,0,0,0.65); backdrop-filter: blur(10px);
      display: flex; align-items: center; justify-content: center;
      opacity: 0; pointer-events: none; transition: opacity 0.2s;
    }
    #confirm-dialog.open { opacity: 1; pointer-events: all; }
    .confirm-body {
      background: var(--surface2); border: 1px solid var(--border);
      padding: 28px; width: min(300px, 86vw);
      transform: scale(0.94); transition: transform 0.2s;
    }
    #confirm-dialog.open .confirm-body { transform: scale(1); }
    .confirm-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 22px; font-weight: 300; margin-bottom: 6px;
    }
    .confirm-sub {
      font-size: 10px; color: var(--text-muted);
      letter-spacing: 0.12em; margin-bottom: 24px;
    }
    .confirm-btns { display: flex; gap: 10px; justify-content: flex-end; }
    .confirm-cancel, .confirm-ok {
      background: none; border: 1px solid var(--border);
      font-family: 'DM Mono', monospace; font-size: 10px;
      letter-spacing: 0.15em; text-transform: uppercase;
      padding: 9px 16px; cursor: pointer; transition: all 0.2s;
    }
    .confirm-cancel { color: var(--text-muted); }
    .confirm-cancel:hover { color: var(--text); border-color: var(--text-muted); }
    .confirm-ok { color: #d07070; border-color: #4a2020; }
    .confirm-ok:hover { background: #3a1818; color: #f09090; }

    /* ── TOAST ── */
    #toast {
      position: fixed; bottom: 32px; left: 50%; transform: translateX(-50%);
      background: var(--surface2); border: 1px solid var(--border);
      color: var(--text-dim); font-size: 10px; letter-spacing: 0.18em;
      text-transform: uppercase; padding: 10px 20px; border-radius: 1px;
      z-index: 500; opacity: 0; transition: opacity 0.3s; white-space: nowrap;
    }
    #toast.show { opacity: 1; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

<!-- TODAY -->
<div id="screen-today" class="screen active">
  <div class="top-bar">
    <span class="app-name">one.</span>
    <div style="display:flex;gap:20px">
      <button class="nav-btn" onclick="showScreen('stats')">stats</button>
      <button class="nav-btn" onclick="showScreen('archive')">archive →</button>
    </div>
  </div>
  <div class="date-block">
    <div class="date-day" id="date-day"></div>
    <div class="date-meta" id="date-meta"></div>
    <div class="streak-badge" id="streak-badge"></div>
  </div>
  <div class="photo-area" id="photo-area" onclick="handlePhotoAreaClick()">
    <div class="photo-placeholder" id="photo-placeholder">
      <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1">
        <rect x="3" y="3" width="18" height="18" rx="1"/>
        <circle cx="12" cy="12" r="4"/>
        <path d="M9 3v2M15 3v2"/>
      </svg>
      <p>tap to add photo</p>
    </div>
    <img id="photo-preview" />
    <button class="photo-overlay-btn" id="change-photo-btn" onclick="openSheet('today', event)">change</button>
  </div>
  <div class="caption-wrap">
    <div class="caption-line">
      <span class="caption-prefix">—&nbsp;</span>
      <input id="caption-input" type="text" maxlength="80" placeholder="오늘 하루를 한 줄로" />
    </div>
    <div class="save-row">
      <span class="char-count" id="char-count">0 / 80</span>
      <button class="save-btn" id="save-btn" onclick="saveEntry()">save</button>
    </div>
  </div>
</div>

<!-- ARCHIVE -->
<div id="screen-archive" class="screen">
  <div class="archive-header">
    <span class="archive-title">archive</span>
    <button class="nav-btn" onclick="showScreen('today')">← today</button>
  </div>
  <div class="year-tabs" id="year-tabs"></div>
  <div class="archive-grid" id="archive-grid"></div>
</div>

<!-- MODAL -->
<div id="modal">
  <div class="modal-top">
    <span class="modal-date" id="modal-date"></span>
    <button class="modal-close" onclick="closeModal()">✕</button>
  </div>
  <div class="modal-photo">
    <img id="modal-img" style="display:none" />
    <span class="modal-no-photo" id="modal-no-photo" style="display:none">사진 없음</span>
  </div>
  <div class="modal-caption-wrap">
    <div class="caption-edit-line">
      <span class="caption-prefix-modal">—&nbsp;</span>
      <input id="modal-caption-input" type="text" maxlength="80" placeholder="한줄 기록 없음" />
    </div>
    <div class="modal-caption-row">
      <span class="modal-caption-count" id="modal-caption-count"></span>
      <button class="modal-save-btn" id="modal-save-btn" onclick="saveModalCaption()">저장</button>
    </div>
  </div>
  <div class="modal-actions">
    <button class="modal-action-btn" onclick="openSheet('modal', event)">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
        <circle cx="12" cy="13" r="4"/>
      </svg>
      사진 교체
    </button>
    <button class="modal-action-btn" id="modal-photo-del-btn" onclick="deletePhoto()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
      </svg>
      사진 삭제
    </button>
    <button class="modal-action-btn danger" onclick="askDelete()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <polyline points="3 6 5 6 21 6"/>

<!-- 파일 인풋 단 하나, 완전히 숨김 -->
<input type="file" id="file-input" accept="image/*"
  style="position:fixed;top:-9999px;left:-9999px;width:1px;height:1px;opacity:0;pointer-events:none;" />

<script>
// ── PWA ──
function makeIcon(size) {
  const c = document.createElement('canvas');
  c.width = c.height = size;
  const ctx = c.getContext('2d');
  // 배경
  ctx.fillStyle = '#0e0e0e';
  ctx.fillRect(0, 0, size, size);
  // 바깥 링
  ctx.beginPath();
  ctx.arc(size/2, size/2, size*0.30, 0, Math.PI*2);
  ctx.strokeStyle = '#d4c4a8';
  ctx.lineWidth = size*0.055;
  ctx.stroke();
  // 중심 점
  ctx.beginPath();
  ctx.arc(size/2, size/2, size*0.055, 0, Math.PI*2);
  ctx.fillStyle = '#d4c4a8';
  ctx.fill();
  // one. 텍스트
  ctx.fillStyle = '#d4c4a8';
  ctx.font = `300 ${Math.round(size*0.11)}px monospace`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('one.', size/2, size*0.72);
  return c.toDataURL('image/png');
}

function initPWA() {
  const icon192 = makeIcon(192);
  const icon512 = makeIcon(512);

  // apple-touch-icon
  document.getElementById('pwa-icon').href = icon192;

  // manifest 동적 생성
  const manifest = {
    name: 'one.', short_name: 'one.',
    description: '하루 한 장. 나만의 타임캡슐.',
    start_url: '/one/',
    scope: '/one/',
    display: 'standalone',
    orientation: 'portrait',
    background_color: '#0e0e0e', theme_color: '#0e0e0e',
    icons: [
      { src: icon192, sizes: '192x192', type: 'image/png', purpose: 'any maskable' },
      { src: icon512, sizes: '512x512', type: 'image/png', purpose: 'any maskable' }
    ]
  };
  const mBlob = new Blob([JSON.stringify(manifest)], { type: 'application/json' });
  document.getElementById('pwa-manifest').href = URL.createObjectURL(mBlob);

  // service worker
  if ('serviceWorker' in navigator) {
    const sw = `const C='one-v1';self.addEventListener('install',e=>e.waitUntil(caches.open(C).then(c=>c.addAll([self.location.pathname])).then(()=>self.skipWaiting())));self.addEventListener('activate',e=>e.waitUntil(caches.keys().then(ks=>Promise.all(ks.filter(k=>k!==C).map(k=>caches.delete(k)))).then(()=>self.clients.claim())));self.addEventListener('fetch',e=>e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request))));`;
    navigator.serviceWorker.register(URL.createObjectURL(new Blob([sw], { type: 'application/javascript' })), { scope: './' }).catch(() => {});
  }

  // 설치 배너
  let installPrompt = null;
  window.addEventListener('beforeinstallprompt', e => {
    e.preventDefault();
    installPrompt = e;
    showInstallBanner();
  });

  function showInstallBanner() {
    if (document.getElementById('pwa-banner')) return;
    const b = document.createElement('div');
    b.id = 'pwa-banner';
    b.style.cssText = 'position:fixed;bottom:28px;left:50%;transform:translateX(-50%);background:#f0ece6;color:#0e0e0e;padding:12px 20px;border-radius:2px;font-size:11px;font-family:"DM Mono",monospace;letter-spacing:0.15em;text-transform:uppercase;font-weight:400;display:flex;align-items:center;gap:12px;box-shadow:0 8px 32px rgba(0,0,0,0.4);z-index:9999;cursor:pointer;white-space:nowrap;';
    b.innerHTML = '<span>앱으로 설치</span><span style="opacity:0.4;">✕</span>';
    b.onclick = async ev => {
      if (ev.target.textContent === '✕') { b.remove(); return; }
      if (installPrompt) {
        installPrompt.prompt();
        const { outcome } = await installPrompt.userChoice;
        if (outcome === 'accepted') b.remove();
        installPrompt = null;
      }
    };
    document.body.appendChild(b);
    setTimeout(() => b && b.remove(), 12000);
  }
}

window.addEventListener('load', initPWA);

// ── DB ──
let db;
const DB_NAME = 'one-app', DB_VER = 1, STORE = 'entries';

function openDB() {
  return new Promise((res, rej) => {
    const req = indexedDB.open(DB_NAME, DB_VER);
    req.onupgradeneeded = e => e.target.result.createObjectStore(STORE, {keyPath:'date'});
    req.onsuccess = e => { db = e.target.result; res(db); };
    req.onerror = rej;
  });
}
const dbGet = d => new Promise((res,rej) => { const r = db.transaction(STORE,'readonly').objectStore(STORE).get(d); r.onsuccess=()=>res(r.result); r.onerror=rej; });
const dbPut = e => new Promise((res,rej) => { const r = db.transaction(STORE,'readwrite').objectStore(STORE).put(e); r.onsuccess=res; r.onerror=rej; });
const dbDel = d => new Promise((res,rej) => { const r = db.transaction(STORE,'readwrite').objectStore(STORE).delete(d); r.onsuccess=res; r.onerror=rej; });
const dbAll = () => new Promise((res,rej) => { const r = db.transaction(STORE,'readonly').objectStore(STORE).getAll(); r.onsuccess=()=>res(r.result); r.onerror=rej; });

// ── STATE ──
let currentPhoto = null, todayKey = '', currentYear = new Date().getFullYear(), allEntries = [];
let modalEntry = null, sheetTarget = 'today';

const M = ['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];
const D = ['SUN','MON','TUE','WED','THU','FRI','SAT'];

const pad = n => String(n).padStart(2,'0');
const toKey = d => `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
const todayDate = () => toKey(new Date());

function fmtDisplay(ds) {
  const [y,m,d] = ds.split('-').map(Number);
  return `${y} / ${M[m-1]} ${String(d).padStart(2,'0')} / ${D[new Date(y,m-1,d).getDay()]}`;
}

// ── INIT ──
async function init() {
  await openDB();
  todayKey = todayDate();
  const [y,m,d] = todayKey.split('-').map(Number);
  document.getElementById('date-day').textContent = pad(d);
  document.getElementById('date-meta').textContent = `${y} / ${M[m-1]} / ${D[new Date(y,m-1,d).getDay()]}`;

  allEntries = await dbAll();
  const streak = calcStreak(allEntries);
  if (streak > 0) document.getElementById('streak-badge').textContent = `${streak}일 연속 ✦`;

  const entry = await dbGet(todayKey);
  if (entry) loadTodayEntry(entry);

  document.getElementById('caption-input').addEventListener('input', e => {
    document.getElementById('char-count').textContent = `${e.target.value.length} / 80`;
  });

  document.getElementById('file-input').addEventListener('change', onFileChange);
  scheduleNotify();
}

function calcStreak(entries) {
  if (!entries.length) return 0;
  const dates = entries.map(e => e.date).sort().reverse();
  let streak = 0, check = new Date();
  for (const ds of dates) {
    if (ds === toKey(check)) { streak++; check.setDate(check.getDate()-1); }
    else break;
  }
  return streak;
}

function loadTodayEntry(entry) {
  if (entry.photo) { currentPhoto = entry.photo; showTodayPhoto(entry.photo); }
  if (entry.caption) {
    document.getElementById('caption-input').value = entry.caption;
    document.getElementById('char-count').textContent = `${entry.caption.length} / 80`;
  }
  markSaved();
}

function showTodayPhoto(b64) {
  const p = document.getElementById('photo-preview');
  p.src = b64; p.classList.add('visible');
  document.getElementById('photo-placeholder').style.display = 'none';
  document.getElementById('change-photo-btn').classList.add('visible');
  document.getElementById('photo-area').classList.add('has-photo');
}

function handlePhotoAreaClick() {
  if (!document.getElementById('photo-area').classList.contains('has-photo')) openSheet('today');
}

// ── BOTTOM SHEET ──
function openSheet(target, e) {
  if (e) e.stopPropagation();
  sheetTarget = target;
  document.getElementById('photo-sheet').classList.add('open');
}
function closeSheet() {
  document.getElementById('photo-sheet').classList.remove('open');
}

function pickPhoto(source) {
  closeSheet();
  const inp = document.getElementById('file-input');
  if (source === 'camera') {
    inp.setAttribute('capture', 'environment');
  } else {
    inp.removeAttribute('capture');
  }
  inp.value = '';
  // 짧은 딜레이 후 클릭 (시트 닫힌 다음)
  setTimeout(() => inp.click(), 150);
}

async function onFileChange(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = async ev => {
    const b64 = ev.target.result;
    if (sheetTarget === 'today') {
      currentPhoto = b64;
      showTodayPhoto(b64);
    } else {
      // 아카이브 모달에서 사진 교체 → DB 즉시 저장
      const updated = { ...modalEntry, photo: b64, ts: Date.now() };
      await dbPut(updated);
      modalEntry = updated;
      allEntries = await dbAll();
      const img = document.getElementById('modal-img');
      img.src = b64; img.style.display = 'block';
      document.getElementById('modal-no-photo').style.display = 'none';
      renderGrid();
      showToast('사진이 교체됐어요 ✦');
    }
    e.target.value = '';
  };
  reader.readAsDataURL(file);
}

function markSaved() {
  const btn = document.getElementById('save-btn');
  btn.textContent = 'saved ✦'; btn.classList.add('saved');
}

async function saveEntry() {
  const caption = document.getElementById('caption-input').value.trim();
  if (!currentPhoto && !caption) { showToast('사진 또는 한줄을 추가하세요'); return; }
  await dbPut({ date: todayKey, photo: currentPhoto || null, caption, ts: Date.now() });
  allEntries = await dbAll();
  markSaved();
  showToast('저장됐어요 ✦');
}

// ── ARCHIVE ──
async function showArchive() {
  allEntries = await dbAll();
  const thisYear = String(new Date().getFullYear());
  const years = [...new Set([thisYear, ...allEntries.map(e => e.date.split('-')[0])])].sort().reverse();
  const tabsEl = document.getElementById('year-tabs');
  tabsEl.innerHTML = '';
  years.forEach(y => {
    const btn = document.createElement('button');
    btn.className = 'year-tab' + (y == currentYear ? ' active' : '');
    btn.textContent = y;
    btn.onclick = () => { currentYear = parseInt(y); renderGrid(); updateYearTabs(); };
    tabsEl.appendChild(btn);
  });
  renderGrid();
}

function updateYearTabs() {
  document.querySelectorAll('.year-tab').forEach(t =>
    t.classList.toggle('active', parseInt(t.textContent) === currentYear)
  );
}

function renderGrid() {
  const grid = document.getElementById('archive-grid');
  grid.innerHTML = '';
  const year = currentYear;
  const isLeap = (year % 4 === 0 && year % 100 !== 0) || year % 400 === 0;
  const entryMap = {};
  allEntries.forEach(e => { entryMap[e.date] = e; });
  const now = new Date();

  for (let i = 0; i < (isLeap ? 366 : 365); i++) {
    const date = new Date(year, 0, i + 1);
    const key = toKey(date);
    const entry = entryMap[key];
    const label = `${date.getMonth()+1}.${date.getDate()}`;
    const cell = document.createElement('div');
    cell.className = 'grid-cell' + (entry ? '' : ' empty');

    if (entry) {
      if (entry.photo) {
        const img = document.createElement('img');
        img.src = entry.photo; img.loading = 'lazy'; cell.appendChild(img);
      } else {
        cell.style.background = 'var(--surface2)';
        const sp = document.createElement('span');
        sp.style.cssText = 'position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:9px;color:var(--text-muted)';
        sp.textContent = label; cell.appendChild(sp);
      }
      const lbl = document.createElement('span');
      lbl.className = 'day-label'; lbl.textContent = label; cell.appendChild(lbl);
      cell.onclick = () => openModal(entry);
    } else {
      cell.setAttribute('data-day', label);
      if (date > now) cell.style.opacity = '0.07';
    }
    grid.appendChild(cell);
  }
}

// ── MODAL ──
function openModal(entry) {
  modalEntry = entry;
  document.getElementById('modal-date').textContent = fmtDisplay(entry.date);
  const img = document.getElementById('modal-img');
  const noP = document.getElementById('modal-no-photo');
  const photoDelBtn = document.getElementById('modal-photo-del-btn');
  if (entry.photo) {
    img.src = entry.photo; img.style.display = 'block'; noP.style.display = 'none';
    photoDelBtn.style.display = 'flex';
  } else {
    img.style.display = 'none'; noP.style.display = 'block';
    photoDelBtn.style.display = 'none';
  }

  const inp = document.getElementById('modal-caption-input');
  inp.value = entry.caption || '';
  document.getElementById('modal-caption-count').textContent = `${(entry.caption||'').length} / 80`;
  const saveBtn = document.getElementById('modal-save-btn');
  saveBtn.textContent = '저장'; saveBtn.classList.remove('saved');

  document.getElementById('modal').classList.add('open');
  inp.oninput = () => {
    document.getElementById('modal-caption-count').textContent = `${inp.value.length} / 80`;
    saveBtn.textContent = '저장'; saveBtn.classList.remove('saved');
  };
}
function closeModal() {
  document.getElementById('modal').classList.remove('open');
  modalEntry = null;
}

async function deletePhoto() {
  if (!modalEntry || !modalEntry.photo) return;
  const updated = { ...modalEntry, photo: null, ts: Date.now() };
  await dbPut(updated);
  modalEntry = updated;
  allEntries = await dbAll();
  // 모달 UI 업데이트
  document.getElementById('modal-img').style.display = 'none';
  document.getElementById('modal-no-photo').style.display = 'block';
  document.getElementById('modal-photo-del-btn').style.display = 'none';
  renderGrid();
  showToast('사진을 삭제했어요');
}

async function saveModalCaption() {
  if (!modalEntry) return;
  const caption = document.getElementById('modal-caption-input').value.trim();
  const updated = { ...modalEntry, caption, ts: Date.now() };
  await dbPut(updated);
  modalEntry = updated;
  allEntries = await dbAll();
  renderGrid();
  const btn = document.getElementById('modal-save-btn');
  btn.textContent = '저장됨 ✦'; btn.classList.add('saved');
  showToast('수정됐어요 ✦');
}

// ── DELETE ──
function askDelete() {
  if (!modalEntry) return;
  document.getElementById('confirm-date-label').textContent = fmtDisplay(modalEntry.date);
  document.getElementById('confirm-dialog').classList.add('open');
}
function closeConfirm() { document.getElementById('confirm-dialog').classList.remove('open'); }
async function confirmDelete() {
  if (!modalEntry) return;
  await dbDel(modalEntry.date);
  allEntries = await dbAll();
  closeConfirm(); closeModal(); renderGrid();
  showToast('삭제됐어요');
}

// ── SCREENS ──
function showScreen(name) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-' + name).classList.add('active');
  if (name === 'archive') showArchive();
  if (name === 'stats') renderStats();
}

// ── STATS ──
function renderStats() {
  const year = new Date().getFullYear();
  const isLeap = (year % 4 === 0 && year % 100 !== 0) || year % 400 === 0;
  const totalDays = isLeap ? 366 : 365;
  const now = new Date();
  const dayOfYear = Math.floor((now - new Date(year, 0, 0)) / 86400000);

  const yearEntries = allEntries.filter(e => e.date.startsWith(String(year)));
  const count = yearEntries.length;
  const pct = Math.round(count / dayOfYear * 100);

  document.getElementById('stat-days').textContent = count;
  document.getElementById('stat-streak').textContent = calcStreak(allEntries);
  document.getElementById('stat-pct').textContent = pct + '%';
  document.getElementById('stat-total').textContent = allEntries.length;

  setTimeout(() => {
    document.getElementById('stat-bar').style.width = pct + '%';
  }, 50);
  document.getElementById('stat-pct-sub').textContent = `${count} / ${dayOfYear}일 — 지나간 날 기준`;

  const first = allEntries.length ? allEntries.slice().sort((a,b)=>a.date>b.date?1:-1)[0].date : null;
  document.getElementById('stat-since').textContent = first ? `${first} 부터` : 'days total';

  // 알림 상태 반영
  updateNotifyBtn();
}

// ── NOTIFY ──
const canNotify = () => 'Notification' in window;

function updateNotifyBtn() {
  const btn = document.getElementById('notify-btn');
  const sub = document.getElementById('notify-sub');
  if (!canNotify()) {
    btn.textContent = '미지원'; btn.classList.remove('on');
    sub.textContent = '이 브라우저는 알림을 지원하지 않아요';
    return;
  }
  const perm = Notification.permission;
  if (perm === 'granted' && localStorage.getItem('notify-on') === '1') {
    btn.textContent = '켜짐'; btn.classList.add('on');
    sub.textContent = '오늘 기록 안 했을 때 알려드려요';
  } else if (perm === 'denied') {
    btn.textContent = '차단됨'; btn.classList.remove('on');
    sub.textContent = '브라우저 설정에서 알림을 허용해주세요';
  } else {
    btn.textContent = '켜기'; btn.classList.remove('on');
    sub.textContent = '오늘 기록 안 했을 때 알려드려요';
  }
}

async function toggleNotify() {
  if (!canNotify()) { showToast('이 브라우저는 알림을 지원하지 않아요'); return; }
  if (Notification.permission === 'denied') { showToast('브라우저 설정에서 알림을 허용해주세요'); return; }
  if (localStorage.getItem('notify-on') === '1') {
    localStorage.removeItem('notify-on');
    updateNotifyBtn(); showToast('알림을 껐어요'); return;
  }
  const perm = await Notification.requestPermission();
  if (perm === 'granted') {
    localStorage.setItem('notify-on', '1');
    updateNotifyBtn(); showToast('알림을 켰어요 ✦'); scheduleNotify();
  } else { updateNotifyBtn(); showToast('알림 권한이 필요해요'); }
}

function scheduleNotify() {
  if (!canNotify()) return;
  if (Notification.permission !== 'granted') return;
  if (localStorage.getItem('notify-on') !== '1') return;
  const todayEntry = allEntries.find(e => e.date === todayKey);
  if (!todayEntry) {
    setTimeout(() => {
      new Notification('one.', {
        body: '오늘 아직 기록하지 않았어요 📸',
        icon: 'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><rect width="100" height="100" fill="%230e0e0e"/><text y=".9em" font-size="80" x="10" fill="%23d4c4a8">◎</text></svg>'
      });
    }, 10000);
  }
}

// ── EXPORT ──
async function exportToday() {
  const entry = await dbGet(todayKey);
  if (!entry && !currentPhoto) {
    showToast('오늘 기록이 없어요');
    return;
  }
  const photo = currentPhoto || (entry && entry.photo);
  const caption = (entry && entry.caption) || document.getElementById('caption-input').value.trim();
  const [y,m,d] = todayKey.split('-').map(Number);
  const dateStr = `${y} / ${M[m-1]} ${pad(d)} / ${D[new Date(y,m-1,d).getDay()]}`;

  const canvas = document.getElementById('export-canvas');
  const SIZE = 1080;
  canvas.width = SIZE; canvas.height = SIZE;
  const ctx = canvas.getContext('2d');

  // 배경
  ctx.fillStyle = '#0e0e0e';
  ctx.fillRect(0, 0, SIZE, SIZE);

  // 사진 그리기
  if (photo) {
    await new Promise(res => {
      const img = new Image();
      img.onload = () => {
        // 사진을 정사각형 중앙에 cover로
        const pad = 60;
        const photoH = caption ? SIZE * 0.72 : SIZE * 0.82;
        const sx = img.width > img.height ? (img.width - img.height) / 2 : 0;
        const sy = img.height > img.width ? (img.height - img.width) / 2 : 0;
        const sq = Math.min(img.width, img.height);
        ctx.drawImage(img, sx, sy, sq, sq, pad, pad, SIZE - pad*2, photoH - pad);
        res();
      };
      img.src = photo;
    });
  }

  // 하단 텍스트 영역
  const textY = caption ? SIZE * 0.76 : SIZE * 0.86;

  ctx.fillStyle = '#555';
  ctx.font = '300 22px monospace';
  ctx.letterSpacing = '4px';
  ctx.fillText(dateStr, 60, textY);

  if (caption) {
    ctx.fillStyle = '#f0ece6';
    ctx.font = '300 32px monospace';
    ctx.letterSpacing = '1px';
    // 줄바꿈 처리
    const maxW = SIZE - 120;
    const words = caption.split('');
    let line = '', lines = [];
    for (const ch of words) {
      const test = line + ch;
      if (ctx.measureText(test).width > maxW && line) { lines.push(line); line = ch; }
      else line = test;
    }
    if (line) lines.push(line);
    lines.forEach((l, i) => ctx.fillText(l, 60, textY + 50 + i * 44));
  }

  // one. 워터마크
  ctx.fillStyle = '#303030';
  ctx.font = '300 20px serif';
  ctx.letterSpacing = '3px';
  ctx.fillText('one.', SIZE - 90, SIZE - 36);

  // 다운로드
  const link = document.createElement('a');
  link.download = `one_${todayKey}.png`;
  link.href = canvas.toDataURL('image/png');
  link.click();
  showToast('이미지로 저장됐어요 ✦');
}

// ── TOAST ──
let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2200);
}

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') { closeModal(); closeSheet(); closeConfirm(); }
});

init();
</script>
